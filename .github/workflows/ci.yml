name: CI CoreLab

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:

  # ──────────────────────────────────────────────────────────────
  # Je vérifie que le fichier .env.example est bien présent
  # à la racine du projet (livrable obligatoire du cahier des charges).
  # ──────────────────────────────────────────────────────────────
  check-env-example:
    runs-on: ubuntu-latest

    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Vérification de la présence de .env.example
        run: |
          if [ ! -f .env.example ]; then
            echo "Erreur : le fichier .env.example est manquant à la racine du projet."
            exit 1
          fi
          echo ".env.example trouvé."

  # ──────────────────────────────────────────────────────────────
  # Je teste le backend : installation des dépendances
  # puis exécution des tests Jest sur les routes API critiques.
  # ──────────────────────────────────────────────────────────────
  backend-ci:
    runs-on: ubuntu-latest
    needs: check-env-example

    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017

    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Installation de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Installation des dépendances backend
        run: |
          cd Server
          npm install

      - name: Lancement des tests API (Jest)
        env:
          JWT_SECRET: super_secret_key_ci_test_123
          PORT: 4242
        run: |
          cd Server
          npm run test

  # ──────────────────────────────────────────────────────────────
  # Je valide le frontend : lint pour interdire les composants classe,
  # puis build pour confirmer que le projet démarre depuis zéro.
  # ──────────────────────────────────────────────────────────────
  frontend-ci:
    runs-on: ubuntu-latest
    needs: check-env-example

    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Installation de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Mise à jour de npm
        run: npm install -g npm@11

      - name: Installation des dépendances frontend
        run: |
          cd client
          npm ci

      - name: Vérification du code avec le linter
        run: |
          cd client
          npm run lint

      - name: Validation du build de production
        run: |
          cd client
          npm run build
